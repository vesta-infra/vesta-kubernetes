apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vesta.fullname" . }}-operator
  labels:
    {{- include "vesta.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernetes.getvesta.sh"]
    resources: ["vestaapps", "vestaprojects", "vestaenvironments", "vestaconfigs", "vestasecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernetes.getvesta.sh"]
    resources: ["vestaapps/status", "vestaprojects/status", "vestaenvironments/status", "vestasecrets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernetes.getvesta.sh"]
    resources: ["vestaapps/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "services", "secrets", "configmaps", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vesta.fullname" . }}-operator
  labels:
    {{- include "vesta.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vesta.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "vesta.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
