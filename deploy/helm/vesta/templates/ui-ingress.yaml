{{- if and .Values.ui.enabled .Values.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vesta.fullname" . }}-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vesta.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  annotations:
    {{- if .Values.ui.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ui.ingress.clusterIssuer }}
    {{- end }}
    {{- with .Values.ui.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ui.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ui.ingress.host }}
      secretName: {{ include "vesta.fullname" . }}-ui-tls
  {{- end }}
  rules:
    - host: {{ .Values.ui.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vesta.fullname" . }}-ui
                port:
                  number: 80
{{- end }}
