apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vestasecrets.kubernetes.getvesta.sh
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: kubernetes.getvesta.sh
  names:
    kind: VestaSecret
    listKind: VestaSecretList
    plural: vestasecrets
    singular: vestasecret
    shortNames:
      - vs
      - vsec
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Synced
          type: boolean
          jsonPath: .status.synced
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: VestaSecret manages Kubernetes Secrets through the Vesta API/UI.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - Opaque
                    - kubernetes.io/dockerconfigjson
                    - kubernetes.io/tls
                project:
                  type: string
                  description: Name of the VestaProject this secret belongs to.
                app:
                  type: string
                  description: Name of the VestaApp this secret is scoped to.
                environment:
                  type: string
                  description: Name of the VestaEnvironment this secret is scoped to.
                data:
                  type: object
                  description: Key-value secret data (values are encrypted at rest).
                  additionalProperties:
                    type: string
                dockerConfig:
                  type: object
                  description: Docker registry credentials. Used when type=kubernetes.io/dockerconfigjson.
                  properties:
                    registry:
                      type: string
                    username:
                      type: string
                    password:
                      type: string
                  required: [registry, username, password]
                tls:
                  type: object
                  description: TLS certificate and key. Used when type=kubernetes.io/tls.
                  properties:
                    cert:
                      type: string
                    key:
                      type: string
                  required: [cert, key]
                externalSecret:
                  type: object
                  description: Sync secret values from an external secret store.
                  properties:
                    provider:
                      type: string
                    path:
                      type: string
                    keys:
                      type: array
                      items:
                        type: object
                        properties:
                          remoteKey:
                            type: string
                          localKey:
                            type: string
                        required: [remoteKey, localKey]
                  required: [provider, path]
            status:
              type: object
              properties:
                synced:
                  type: boolean
                lastSyncedAt:
                  type: string
                  format: date-time
                secretName:
                  type: string
                  description: Name of the actual Kubernetes Secret created by the operator.
