apiVersion: apps/v1
kind: Deployment
metadata:
  name: vesta-operator
  namespace: vesta-system
  labels:
    app.kubernetes.io/name: vesta-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: vesta
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vesta-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vesta-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/part-of: vesta
    spec:
      serviceAccountName: vesta-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/vesta-kubernetes/operator:latest
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
